comment: false

coverage:
  precision: 2
  round: down
  status:
    project:
      default:
        target: auto
        threshold: 5%
        informational: true
    patch:
      default:
        target: 70%
        threshold: 10%
        informational: true

ignore:
  - "crates/shiplog-testkit/**"
  - "fuzz/**"
  - "examples/**"
  - "benches/**"
  - "target/**"
