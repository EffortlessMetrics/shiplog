expires = "permanent"

[[allow]]
id = "non-rust-cargo-lock"
glob = "Cargo.lock"
category = "build_lockfile"
language = "toml"
owner = "release"
reason = "Reproducible dep resolution; checked in for the binary crate."
created = "2026-05-09"
expires = "permanent"

[[allow]]
id = "non-rust-rust-toolchain"
glob = "rust-toolchain.toml"
category = "build_metadata"
language = "toml"
owner = "release/ci"
reason = "Pins the workspace Rust toolchain (1.95.0 since PR #145)."
created = "2026-05-09"
expires = "permanent"

[[allow]]
id = "non-rust-deny-config"
glob = "deny.toml"
category = "policy_config"
language = "toml"
owner = "release/ci"
reason = "cargo-deny configuration for licenses/bans/sources/advisories."
created = "2026-05-09"
expires = "permanent"

[[allow]]
id = "non-rust-ripr-config"
path = "ripr.toml"
category = "policy_config"
language = "toml"
owner = "policy"
reason = "ripr configuration (analysis mode, severity mapping, suppressions path). Added in PR #153."
created = "2026-05-10"
expires = "permanent"

[[allow]]
id = "non-rust-codecov"
glob = "codecov.yml"
category = "ci_config"
language = "yaml"
owner = "release/ci"
reason = "Codecov flag and surface configuration; pairs with coverage workflow."
created = "2026-05-09"
expires = "permanent"

# ── Policy and schemas ─────────────────────────────────────────────────

[[allow]]
id = "non-rust-policy"
glob = "policy/**"
category = "policy_ledger"
language = "toml"
owner = "policy"
reason = "Machine-readable policy ledgers (this directory). Self-referential allow."
broad_glob_reason = "Per-ledger detail is the contents of each TOML; glob is the ledger directory."
created = "2026-05-09"
expires = "permanent"

[[allow]]
id = "non-rust-contracts"
glob = "contracts/schemas/**"
category = "schema"
language = "json"
owner = "policy"
reason = "JSON Schemas for shiplog persisted contracts (intake-report, agent-pack today; ci-plan and ci-actuals added in PR #142)."
broad_glob_reason = "Schemas under contracts/schemas/ are inert JSON; per-file enumeration tracks generated artifact paths but adds no review value."
created = "2026-05-09"
expires = "permanent"

# ── Test fixtures and examples ─────────────────────────────────────────

[[allow]]
id = "non-rust-test-fixtures"
glob = "tests/**"
category = "test_fixture"
language = "mixed"
owner = "policy"
reason = "Integration test fixtures: YAML/JSON/JSONL inputs, snapshot expectations."
broad_glob_reason = "Fixtures are inert data; per-file enumeration would not add review value."
created = "2026-05-09"
expires = "permanent"

[[allow]]
id = "non-rust-crate-github-recorded-fixtures"
glob = "apps/shiplog/tests/fixtures/github-warm-rerun/**"
category = "test_fixture"
language = "json"
owner = "policy"
reason = "Synthetic recorded GitHub HTTP fixtures used to prove warm-rerun freshness without live network."
broad_glob_reason = "One scenario directory per recorded GitHub fixture; fixtures are inert JSON reviewed with the focused tests that consume them."
created = "2026-05-13"
review_after = "2026-11-13"
expires = "permanent"

[[allow]]
id = "non-rust-snapshots"
glob = "**/snapshots/**"
category = "test_snapshot"
language = "mixed"
owner = "policy"
reason = "insta snapshot files (.snap and .snap.new)."
broad_glob_reason = "Snapshots are generated by `cargo insta`; per-file enumeration would constantly drift."
created = "2026-05-09"
expires = "permanent"

[[allow]]
id = "non-rust-examples"
glob = "examples/**"
category = "example"
language = "mixed"
owner = "docs"
reason = "Example shiplog.toml configurations and YAML manual-event files referenced from README/docs."
broad_glob_reason = "Examples are inert data referenced from docs."
created = "2026-05-09"
expires = "permanent"

