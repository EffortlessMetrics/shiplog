schema_version = 1
policy = "ripr-suppressions"
owner = "EffortlessMetrics"
status = "advisory"

# Suppressions for ripr advisory findings. The ripr lane lands in PR #153
# (advisory only). Suppressions are reserved for findings the team has
# decided are acceptable and tracked, typically because:
#   - a property test or mutation calibration covers the equivalence class,
#   - the finding is in a code path that is unreachable from production,
#   - the finding is a known false positive in ripr's static analysis.
#
# Skeleton — entries shape:
#
# [[suppression]]
# id = "ripr-0001"
# path = "apps/shiplog/src/redact/example.rs"
# function = "redact_alias"
# severity = "weakly_exposed"
# owner = "shiplog::redact"
# reason = "Property test covers the equivalence class; full mutation calibrated this finding on main@<sha>."
# created = "2026-05-09"
# review_after = "2026-09-09"
# expires = "2027-02-09"
#
# [suppression.context]
# tracked_by_test = "shiplog::redact::tests::redact_alias_property"
# tracked_by_mutation_run = "main@<sha>"
#
# See docs/ci/ripr.md (added in PR #142) for the operating doc.
