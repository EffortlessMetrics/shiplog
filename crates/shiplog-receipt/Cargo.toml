[package]
name = "shiplog-receipt"
version = "0.2.1"
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors.workspace = true
description = "Markdown receipt line formatter for canonical shiplog events."
readme = "README.md"
documentation = "https://docs.rs/shiplog-receipt"
repository.workspace = true
homepage.workspace = true
keywords = ["receipt", "markdown", "renderer", "events", "formatting"]
