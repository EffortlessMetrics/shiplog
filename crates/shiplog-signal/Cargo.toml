[package]
name = "shiplog-signal"
version = "0.2.1"
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors.workspace = true
description = "Signal handling utilities for shiplog."
readme = "README.md"
documentation = "https://docs.rs/shiplog-signal"
repository.workspace = true
homepage.workspace = true
keywords = ["shiplog", "signal", "concurrency", "async", "synchronization"]
categories = ["concurrency", "asynchronous"]

[dependencies]
tokio = { workspace = true, features = ["signal", "sync", "time"] }
anyhow.workspace = true

[dev-dependencies]
tokio = { version = "1.49.0", features = ["rt-multi-thread", "macros", "sync", "time", "signal"] }

[lints]
workspace = true
