[package]
name = "shiplog-stream"
version = "0.2.1"
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors.workspace = true
description = "Stream utilities for shiplog."
readme = "README.md"
documentation = "https://docs.rs/shiplog-stream"
repository.workspace = true
homepage.workspace = true
keywords = ["shiplog", "stream", "streaming", "pipeline", "data-processing"]
