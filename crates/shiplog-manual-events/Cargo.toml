shiplog-ids = { path = "../shiplog-ids", version = "0.2.1" }
shiplog-schema = { path = "../shiplog-schema", version = "0.2.1" }

[dev-dependencies]
insta = { workspace = true, features = ["redactions"] }
proptest.workspace = true
tempfile.workspace = true

[lints]
workspace = true
