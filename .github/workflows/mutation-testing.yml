name: Mutation Testing

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  mutation-test:
    name: Mutation Testing
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.92"
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Install cargo-mutants
        run: cargo install cargo-mutants --locked

      - name: Run mutation tests for Tier 1 crates
        id: tier1
        continue-on-error: true
        run: |
          set +e
          fail=0
          echo "Testing Tier 1: Critical Core crates (target ≥ 90%)..."
          run_mutants_keepalive () {
            local crate="$1"
            local timeout="$2"

            echo "Running cargo mutants for ${crate} (timeout=${timeout}s)..."
            cargo mutants -p "${crate}" --timeout "${timeout}" --copy-target=false &
            local pid=$!

            # GitHub Actions kills steps that produce no output for ~10 minutes.
            while kill -0 "${pid}" 2>/dev/null; do
              echo "...still running: cargo mutants -p ${crate}"
              sleep 60
            done

            wait "${pid}"
          }
          cargo mutants -p shiplog-schema --timeout 180 --copy-target=false || fail=1
          cargo mutants -p shiplog-redact --timeout 180 --copy-target=false || fail=1
          run_mutants_keepalive shiplog-coverage 600 || fail=1
          cargo mutants -p shiplog-ids --timeout 120 --copy-target=false || fail=1
          cargo mutants -p shiplog-ports --timeout 120 --copy-target=false || fail=1
          cargo mutants -p shiplog-date-windows --timeout 120 --copy-target=false || fail=1
          cargo mutants -p shiplog-validate --timeout 120 --copy-target=false || fail=1
          cargo mutants -p shiplog-redaction-policy --timeout 120 --copy-target=false || fail=1
          cargo mutants -p shiplog-redaction-profile --timeout 120 --copy-target=false || fail=1
          exit $fail

      - name: Run mutation tests for Tier 2 crates
        id: tier2
        continue-on-error: true
        run: |
          set +e
          fail=0
          echo "Testing Tier 2: Pipeline Core crates (target ≥ 80%)..."
          cargo mutants -p shiplog-engine --timeout 150 --copy-target=false || fail=1
          cargo mutants -p shiplog-bundle --timeout 150 --copy-target=false || fail=1
          cargo mutants -p shiplog-workstreams --timeout 150 --copy-target=false || fail=1
          cargo mutants -p shiplog-workstream-cluster --timeout 150 --copy-target=false || fail=1
          cargo mutants -p shiplog-workstream-receipt-policy --timeout 120 --copy-target=false || fail=1
          cargo mutants -p shiplog-workstream-layout --timeout 120 --copy-target=false || fail=1
          cargo mutants -p shiplog-redaction-repo --timeout 120 --copy-target=false || fail=1
          cargo mutants -p shiplog-redaction-projector --timeout 120 --copy-target=false || fail=1
          cargo mutants -p shiplog-output-layout --timeout 120 --copy-target=false || fail=1
          cargo mutants -p shiplog-manual-events --timeout 120 --copy-target=false || fail=1
          cargo mutants -p shiplog-export --timeout 120 --copy-target=false || fail=1
          exit $fail

      - name: Run mutation tests for Tier 3 crates
        id: tier3
        continue-on-error: true
        run: |
          set +e
          fail=0
          echo "Testing Tier 3: Adapters and Renderers crates (target ≥ 70%)..."
          cargo mutants -p shiplog-ingest-github --timeout 120 --copy-target=false || fail=1
          cargo mutants -p shiplog-ingest-json --timeout 120 --copy-target=false || fail=1
          cargo mutants -p shiplog-ingest-manual --timeout 120 --copy-target=false || fail=1
          cargo mutants -p shiplog-ingest-git --timeout 120 --copy-target=false || fail=1
          cargo mutants -p shiplog-ingest-gitlab --timeout 120 --copy-target=false || fail=1
          cargo mutants -p shiplog-ingest-jira --timeout 120 --copy-target=false || fail=1
          cargo mutants -p shiplog-ingest-linear --timeout 120 --copy-target=false || fail=1
          cargo mutants -p shiplog-render-md --timeout 120 --copy-target=false || fail=1
          cargo mutants -p shiplog-render-json --timeout 120 --copy-target=false || fail=1
          cargo mutants -p shiplog-cache --timeout 120 --copy-target=false || fail=1
          cargo mutants -p shiplog-cache-sqlite --timeout 120 --copy-target=false || fail=1
          cargo mutants -p shiplog-cache-key --timeout 120 --copy-target=false || fail=1
          cargo mutants -p shiplog-cache-stats --timeout 120 --copy-target=false || fail=1
          cargo mutants -p shiplog-cache-expiry --timeout 120 --copy-target=false || fail=1
          cargo mutants -p shiplog-template --timeout 120 --copy-target=false || fail=1
          cargo mutants -p shiplog-filter --timeout 120 --copy-target=false || fail=1
          cargo mutants -p shiplog-merge --timeout 120 --copy-target=false || fail=1
          cargo mutants -p shiplog-diff --timeout 120 --copy-target=false || fail=1
          cargo mutants -p shiplog-query --timeout 120 --copy-target=false || fail=1
          cargo mutants -p shiplog-storage --timeout 120 --copy-target=false || fail=1
          cargo mutants -p shiplog-config --timeout 120 --copy-target=false || fail=1
          exit $fail

      - name: Run mutation tests for Tier 4 crates
        id: tier4
        continue-on-error: true
        run: |
          set +e
          fail=0
          echo "Testing Tier 4: Supporting and Experimental crates (target ≥ 60%)..."
          cargo mutants -p shiplog-cluster-llm --timeout 120 --copy-target=false || fail=1
          cargo mutants -p shiplog-cluster-llm-parse --timeout 120 --copy-target=false || fail=1
          cargo mutants -p shiplog-cluster-llm-prompt --timeout 120 --copy-target=false || fail=1
          cargo mutants -p shiplog-plugin --timeout 120 --copy-target=false || fail=1
          cargo mutants -p shiplog-team-core --timeout 120 --copy-target=false || fail=1
          cargo mutants -p shiplog-team-aggregate --timeout 120 --copy-target=false || fail=1
          cargo mutants -p shiplog-team-render --timeout 120 --copy-target=false || fail=1
          cargo mutants -p shiplog-report --timeout 120 --copy-target=false || fail=1
          cargo mutants -p shiplog-transform --timeout 120 --copy-target=false || fail=1
          cargo mutants -p shiplog-migrate --timeout 120 --copy-target=false || fail=1
          cargo mutants -p shiplog-archive --timeout 120 --copy-target=false || fail=1
          cargo mutants -p shiplog-notify --timeout 120 --copy-target=false || fail=1
          cargo mutants -p shiplog-stats --timeout 120 --copy-target=false || fail=1
          cargo mutants -p shiplog --timeout 120 --copy-target=false || fail=1
          exit $fail

      - name: Check mutation results
        if: always()
        run: |
          if [ "${{ steps.tier1.outcome }}" = "failure" ] || \
             [ "${{ steps.tier2.outcome }}" = "failure" ] || \
             [ "${{ steps.tier3.outcome }}" = "failure" ] || \
             [ "${{ steps.tier4.outcome }}" = "failure" ]; then
            echo "Mutation testing failed for one or more tiers"
            exit 1
          fi

      - name: Upload mutation test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mutation-test-results
          path: |
            target/mutants/out/
            target/mutants/**/*.html
          retention-days: 30

      - name: Generate mutation test summary
        if: always()
        run: |
          echo "# Mutation Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Mutation testing completed. Check the uploaded artifacts for detailed results." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Minimum Scores by Tier" >> $GITHUB_STEP_SUMMARY
          echo "- Tier 1 (Critical Core): ≥ 90%" >> $GITHUB_STEP_SUMMARY
          echo "- Tier 2 (Pipeline Core): ≥ 80%" >> $GITHUB_STEP_SUMMARY
          echo "- Tier 3 (Adapters/Renderers): ≥ 70%" >> $GITHUB_STEP_SUMMARY
          echo "- Tier 4 (Supporting/Experimental): ≥ 60%" >> $GITHUB_STEP_SUMMARY
