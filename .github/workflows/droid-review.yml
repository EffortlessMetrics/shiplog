name: Droid Auto Review

on:
  pull_request:
    types: [opened, ready_for_review, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  droid-review:
    if: |
      github.event.pull_request.head.repo.full_name == github.repository &&
      !contains(github.event.pull_request.title, '[skip-review]')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    env:
      FACTORY_API_KEY: ${{ secrets.FACTORY_API_KEY }}
    steps:
      - name: Skip when Factory API key is unavailable
        if: env.FACTORY_API_KEY == ''
        run: echo "FACTORY_API_KEY is not configured; skipping Droid auto review."

      - name: Checkout repository
        if: env.FACTORY_API_KEY != ''
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 1

      - name: Run Droid Auto Review
        if: env.FACTORY_API_KEY != ''
        continue-on-error: true
        uses: EffortlessMetrics/droid-action-safe@01e76b659e4b1e5f23feedc8cfabf8dc14c7485f # based on Factory-AI/droid-action v5; raw debug artifact upload disabled
        with:
          factory_api_key: ${{ env.FACTORY_API_KEY }}
          upload_debug_artifacts: false
          automatic_review: true
          automatic_security_review: true
