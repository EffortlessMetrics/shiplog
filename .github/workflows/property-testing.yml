name: Property Testing

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  PROPTEST_CASES: "256"
  PROPTEST_MAX_LOCAL_REJECTS: "10000"
  PROPTEST_MAX_GLOBAL_REJECTS: "100000"

jobs:
  property-test:
    name: Property Testing
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.92"
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Run property tests
        run: |
          echo "Running property tests for all crates..."
          cargo test --workspace --all-features -- --test-threads=4

      - name: Run property tests for shiplog-ids
        run: cargo test -p shiplog-ids -- --test-threads=4

      - name: Run property tests for shiplog-schema
        run: cargo test -p shiplog-schema -- --test-threads=4

      - name: Run property tests for shiplog-redact
        run: cargo test -p shiplog-redact -- --test-threads=4

      - name: Run property tests for shiplog-coverage
        run: cargo test -p shiplog-coverage -- --test-threads=4

      - name: Run property tests for shiplog-workstreams
        run: cargo test -p shiplog-workstreams -- --test-threads=4

      - name: Run property tests for shiplog-cache
        run: cargo test -p shiplog-cache -- --test-threads=4

      - name: Run property tests for shiplog-bundle
        run: cargo test -p shiplog-bundle -- --test-threads=4

      - name: Run property tests for shiplog-engine
        run: cargo test -p shiplog-engine -- --test-threads=4

      - name: Run property tests for shiplog-date-windows
        run: cargo test -p shiplog-date-windows -- --test-threads=4

      - name: Run property tests for shiplog-ingest-manual
        run: cargo test -p shiplog-ingest-manual -- --test-threads=4

      - name: Run property tests for shiplog-render-md
        run: cargo test -p shiplog-render-md -- --test-threads=4

      - name: Run property tests for shiplog-render-json
        run: cargo test -p shiplog-render-json -- --test-threads=4

      - name: Run property tests for shiplog-cluster-llm
        run: cargo test -p shiplog-cluster-llm -- --test-threads=4

      - name: Run property tests for shiplog-cluster-llm-parse
        run: cargo test -p shiplog-cluster-llm-parse -- --test-threads=4

      - name: Run property tests for shiplog-cluster-llm-prompt
        run: cargo test -p shiplog-cluster-llm-prompt -- --test-threads=4

      - name: Run property tests for shiplog-receipt
        run: cargo test -p shiplog-receipt -- --test-threads=4

      - name: Run property tests for shiplog-redaction-profile
        run: cargo test -p shiplog-redaction-profile -- --test-threads=4

      - name: Run property tests for shiplog-redaction-repo
        run: cargo test -p shiplog-redaction-repo -- --test-threads=4

      - name: Run property tests for shiplog-redaction-projector
        run: cargo test -p shiplog-redaction-projector -- --test-threads=4

      - name: Run property tests for shiplog-redaction-policy
        run: cargo test -p shiplog-redaction-policy -- --test-threads=4

      - name: Run property tests for shiplog-workstream-receipt-policy
        run: cargo test -p shiplog-workstream-receipt-policy -- --test-threads=4

      - name: Run property tests for shiplog-workstream-layout
        run: cargo test -p shiplog-workstream-layout -- --test-threads=4

      - name: Run property tests for shiplog-workstream-cluster
        run: cargo test -p shiplog-workstream-cluster -- --test-threads=4

      - name: Run property tests for shiplog-cache-key
        run: cargo test -p shiplog-cache-key -- --test-threads=4

      - name: Run property tests for shiplog-cache-expiry
        run: cargo test -p shiplog-cache-expiry -- --test-threads=4

      - name: Run property tests for shiplog-cache-stats
        run: cargo test -p shiplog-cache-stats -- --test-threads=4

      - name: Run property tests for shiplog-cache-sqlite
        run: cargo test -p shiplog-cache-sqlite -- --test-threads=4

      - name: Run property tests for shiplog-testkit (roadmap)
        run: cargo test -p shiplog-testkit roadmap_property_tests -- --test-threads=4

      - name: Generate property test summary
        if: always()
        run: |
          echo "# Property Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Property-based tests completed successfully!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Tested Crates" >> $GITHUB_STEP_SUMMARY
          echo "- shiplog-ids" >> $GITHUB_STEP_SUMMARY
          echo "- shiplog-schema" >> $GITHUB_STEP_SUMMARY
          echo "- shiplog-redact" >> $GITHUB_STEP_SUMMARY
          echo "- shiplog-coverage" >> $GITHUB_STEP_SUMMARY
          echo "- shiplog-workstreams" >> $GITHUB_STEP_SUMMARY
          echo "- shiplog-cache" >> $GITHUB_STEP_SUMMARY
          echo "- shiplog-bundle" >> $GITHUB_STEP_SUMMARY
          echo "- shiplog-engine" >> $GITHUB_STEP_SUMMARY
          echo "- shiplog-date-windows" >> $GITHUB_STEP_SUMMARY
          echo "- shiplog-ingest-manual" >> $GITHUB_STEP_SUMMARY
          echo "- shiplog-render-md" >> $GITHUB_STEP_SUMMARY
          echo "- shiplog-render-json" >> $GITHUB_STEP_SUMMARY
          echo "- shiplog-cluster-llm" >> $GITHUB_STEP_SUMMARY
          echo "- shiplog-cluster-llm-parse" >> $GITHUB_STEP_SUMMARY
          echo "- shiplog-cluster-llm-prompt" >> $GITHUB_STEP_SUMMARY
          echo "- shiplog-receipt" >> $GITHUB_STEP_SUMMARY
          echo "- shiplog-redaction-profile" >> $GITHUB_STEP_SUMMARY
          echo "- shiplog-redaction-repo" >> $GITHUB_STEP_SUMMARY
          echo "- shiplog-redaction-projector" >> $GITHUB_STEP_SUMMARY
          echo "- shiplog-redaction-policy" >> $GITHUB_STEP_SUMMARY
          echo "- shiplog-workstream-receipt-policy" >> $GITHUB_STEP_SUMMARY
          echo "- shiplog-workstream-layout" >> $GITHUB_STEP_SUMMARY
          echo "- shiplog-workstream-cluster" >> $GITHUB_STEP_SUMMARY
          echo "- shiplog-cache-key" >> $GITHUB_STEP_SUMMARY
          echo "- shiplog-cache-expiry" >> $GITHUB_STEP_SUMMARY
          echo "- shiplog-cache-stats" >> $GITHUB_STEP_SUMMARY
          echo "- shiplog-cache-sqlite" >> $GITHUB_STEP_SUMMARY
          echo "- shiplog-testkit (roadmap property tests)" >> $GITHUB_STEP_SUMMARY
