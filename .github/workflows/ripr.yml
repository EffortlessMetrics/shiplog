name: ripr

# Advisory PR-scoped ripr exposure and review guidance for Rust diffs.
# Public README badges remain repo-scoped and are generated separately by
# `cargo xtask badges`; this workflow only uploads diff-scoped artifacts.

on:
  pull_request:
    paths:
      - "apps/**"
      - "crates/**"
      - "xtask/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "ripr.toml"
      - "policy/ripr-suppressions.toml"
  workflow_dispatch:

permissions:
  contents: read
  checks: write

concurrency:
  group: ripr-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' && github.event.action == 'synchronize' }}

env:
  CARGO_TERM_COLOR: always

jobs:
  advisory:
    name: advisory
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.95.0"

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "ripr"
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Install ripr
        run: cargo install ripr --locked

      - name: Fetch base branch
        if: github.base_ref != ''
        run: git fetch origin ${{ github.base_ref }}

      - name: RIPR PR evidence
        id: ripr_pr
        run: cargo xtask ripr-pr

      - name: RIPR review guidance
        id: ripr_review
        run: cargo xtask ripr-review-comments

      - name: RIPR PR contract
        if: always()
        run: cargo xtask ripr-pr --check

      - name: RIPR review contract
        if: always()
        run: cargo xtask ripr-review-comments --check

      - name: RIPR review summary
        if: always()
        shell: bash
        run: |
          {
            echo "## RIPR Review Guidance"
            echo
            if [ -f target/ripr/review/comments.md ]; then
              cat target/ripr/review/comments.md
            else
              echo "No RIPR review guidance was produced."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: RIPR annotations
        if: always()
        run: python scripts/ripr-annotations.py

      - name: Upload RIPR PR evidence
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ripr-pr
          path: target/ripr/pr
          retention-days: 30
          if-no-files-found: warn

      - name: Upload RIPR review guidance
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ripr-review
          path: target/ripr/review
          retention-days: 30
          if-no-files-found: warn
