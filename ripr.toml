# ripr — advisory static exposure evidence for Rust diffs and repo badges.
#
# Public README badges are repo-scoped and generated by `cargo xtask badges`.
# Pull-request evidence is diff-scoped and generated by
# `cargo xtask ripr-pr` plus `cargo xtask ripr-review-comments`.
#
# Always advisory: ripr evidence should guide focused tests and optional
# targeted mutation routing, not post inline comments or block merge by default.

[analysis]
mode = "draft"
include_unchanged_tests = true

[oracles]
snapshot_strength = "medium"
mock_expectation_strength = "medium"
broad_error_strength = "weak"

[severity.findings]
exposed = "note"
weakly_exposed = "warning"
reachable_unrevealed = "warning"
no_static_path = "note"
infection_unknown = "note"
propagation_unknown = "note"
static_unknown = "note"

[severity.seams]
strongly_gripped = "off"
weakly_gripped = "warning"
ungripped = "warning"
reachable_unrevealed = "warning"
activation_unknown = "info"
propagation_unknown = "info"
observation_unknown = "info"
discrimination_unknown = "info"
opaque = "info"
intentional = "off"
suppressed = "off"

[lsp]
seam_diagnostics = true

[reports]
max_related_tests = 8

[suppressions]
path = ".ripr/suppressions.toml"
