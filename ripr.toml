# ripr — fast oracle-exposure filter for PR Rust diffs.
#
# Always advisory in v0.5.0. The workflow at
# .github/workflows/ripr.yml emits target/ripr/pr and target/ripr/review
# artifacts and never blocks merge. See docs/ci/ripr.md
# for the operating doc; see policy/ripr-suppressions.toml for known-
# tracked findings.
#
# v1 in PR #153 shipped the workflow + config + suppressions ledger as a
# stub. This config now matches the installed ripr command surface used
# for generated repo-scoped badges and diff-scoped PR evidence.

[analysis]
mode = "draft"

[reports]
max_related_tests = 8
